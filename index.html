<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teyvat DB II | Portafolio Cloud Final</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <nav class="navbar fixed-top navbar-expand-lg navbar-dark bg-genshin-nav">
        <div class="container-fluid px-lg-5">
            <a class="navbar-brand fw-bold Cinzel" href="#">DATABASE <span class="text-genshin-accent">II</span></a>
            <div class="ms-auto d-flex align-items-center">
                <span id="roleLabel" class="me-3 text-white small d-none d-md-inline">VIAJERO: INVITADO</span>
                <button class="btn-genshin-sm" id="authBtn">ACCESO ADMIN</button>
            </div>
        </div>
    </nav>

    <section class="hero-intro">
        <div class="hero-overlay text-center">
            <div class="hero-content">
                <img src="img/log.png" class="hero-logo mb-4" alt="Logo UPLA">
                <h1 class="Cinzel hero-title">PORTAFOLIO DIGITAL</h1>
                <p class="hero-subtitle">INGENIERÍA DE SISTEMAS | 2026</p>
                <div class="hero-divider"></div>
                <p class="text-white opacity-50 small">Gestión Dinámica de Recursos en Supabase</p>
            </div>
        </div>
    </section>

    <div id="world-container"></div>

    <div class="modal fade" id="weekModal" tabindex="-1">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content bg-genshin-dark text-white">
                <div class="modal-header border-0 px-lg-5 pt-4">
                    <h5 class="modal-title Cinzel h2 text-genshin-gold" id="modalUnitTitle">RECURSOS</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body px-lg-5 pb-5">
                    <div id="weeks-list" class="weeks-banner-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
